---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: vault-demo-app
  namespace: vault-demo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: vault-demo-app
spec:
  # Let OpenShift generate the hostname automatically
  # It will be: vault-demo-app-vault-demo.apps.<cluster-domain>
  to:
    kind: Service
    name: vault-demo-app
    weight: 100
  port:
    targetPort: https
  tls:
    # Passthrough termination - app handles TLS with Vault certificate
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

