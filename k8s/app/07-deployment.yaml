---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-demo-app
  namespace: vault-demo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: vault-demo-app
spec:
  replicas: 1
  revisionHistoryLimit: 2  # Keep only 2 old ReplicaSets for rollback
  selector:
    matchLabels:
      app: vault-demo-app
  template:
    metadata:
      labels:
        app: vault-demo-app
    spec:
      serviceAccountName: vault-demo-app
      
      containers:
      - name: vault-demo-app
        image: quay.io/ibm-tec/vault-demo-app:latest
        imagePullPolicy: Always
        
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        
        # Card 1: Static secrets via environment variables
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: vault-static-secret
              key: api_key
        - name: ENVIRONMENT
          valueFrom:
            secretKeyRef:
              name: vault-static-secret
              key: environment
        - name: CREATED_AT
          valueFrom:
            secretKeyRef:
              name: vault-static-secret
              key: created_at
        - name: ROUTE_HOSTNAME
          value: "vault-demo-app-vault-demo.apps.ocp18.tec.cz.ibm.com"
        - name: PORT
          value: "8443"
        - name: TLS_CERT_PATH
          value: "/vault/secrets/pki/tls.crt"
        - name: TLS_KEY_PATH
          value: "/vault/secrets/pki/tls.key"
        
        volumeMounts:
        # Card 2: Dynamic secrets via file mount
        - name: dynamic-secrets
          mountPath: /vault/secrets/dynamic
          readOnly: true
        
        # Card 3: CSI secrets via direct mount
        - name: csi-secrets
          mountPath: /mnt/secrets/vault-data
          readOnly: true
        
        # Card 4: PKI certificate for HTTPS
        - name: pki-cert
          mountPath: /vault/secrets/pki
          readOnly: true
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
      
      volumes:
      # Card 2: Dynamic database credentials (file mount)
      - name: dynamic-secrets
        secret:
          secretName: vault-dynamic-secret
          defaultMode: 0400
      
      # Card 3: CSI secrets (direct mount from Vault)
      - name: csi-secrets
        secret:
          secretName: vault-csi-secret
          defaultMode: 0400
      
      # Card 4: PKI certificate (Vault-issued TLS cert)
      - name: pki-cert
        secret:
          secretName: vault-pki-cert
          defaultMode: 0400
      
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

