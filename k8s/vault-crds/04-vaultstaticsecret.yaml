---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vault-static-secret
  namespace: vault-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Reference to VaultAuth
  vaultAuthRef: vault-auth
  
  # KV-v2 secret engine mount and path
  mount: secret
  type: kv-v2
  path: demo/static
  
  # Refresh interval (how often to check for updates)
  refreshAfter: 30s
  
  # Destination Kubernetes secret
  destination:
    name: vault-static-secret
    create: true
    
  # Automatic rollout restart when secret changes
  rolloutRestartTargets:
    - kind: Deployment
      name: vault-demo-app

