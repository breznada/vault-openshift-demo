---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vault-csi-secret
  namespace: vault-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Reference to VaultAuth
  vaultAuthRef: vault-auth
  
  # KV-v2 secret engine mount and path for CSI demo
  mount: secret
  type: kv-v2
  path: demo/csi
  
  # Refresh interval
  refreshAfter: 30s
  
  # Destination Kubernetes secret (will be mounted as volume)
  destination:
    name: vault-csi-secret
    create: true

