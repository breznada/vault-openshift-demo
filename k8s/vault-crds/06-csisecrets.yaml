---
apiVersion: secrets.hashicorp.com/v1beta1
kind: CSISecrets
metadata:
  name: vault-csi-secrets
  namespace: vault-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Reference to existing VaultAuth in vault-demo namespace
  vaultAuthRef:
    name: vault-auth
  
  # Define which secrets to fetch from Vault
  secrets:
    vaultStaticSecrets:
      # KV-v2 secret for CSI demo
      - mount: secret
        path: demo/csi
        type: kv-v2
  
  # Access control - which pods can use this CSISecrets resource
  accessControl:
    # Service account pattern (regex)
    serviceAccountPattern: "^vault-demo-app$"
    # Namespace patterns (regex)
    namespacePatterns:
      - "^vault-demo$"
    # Pod name patterns (regex) - optional, allows any pod name if not specified
    podNamePatterns:
      - "^vault-demo-app-.*"
  
  # Sync configuration for dynamic updates
  syncConfig:
    # Sync secrets when container state changes
    containerState:
      # Only sync for containers matching this pattern
      namePattern: "^vault-demo-app$"
    # Refresh interval - how often to check Vault for updates
    refreshInterval: 1s

