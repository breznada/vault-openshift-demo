---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultPKISecret
metadata:
  name: vault-pki-secret
  namespace: vault-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Reference to VaultAuth
  vaultAuthRef: vault-auth
  
  # PKI secret engine mount and role
  mount: pki
  role: tec-role
  
  # Certificate common name and alt names
  commonName: vault-demo-app-vault-demo.apps.ocp18.tec.cz.ibm.com
  altNames:
    - vault-demo.apps.ocp18.tec.cz.ibm.com
  
  # Certificate format
  format: pem
  
  # Revoke certificate on deletion
  revoke: true
  
  # Clear secret on deletion
  clear: true
  
  # Destination Kubernetes TLS secret
  destination:
    name: vault-pki-cert
    create: true
    type: kubernetes.io/tls
  
  # Automatic rollout restart when certificate rotates
  rolloutRestartTargets:
    - kind: Deployment
      name: vault-demo-app

