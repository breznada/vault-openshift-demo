---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultDynamicSecret
metadata:
  name: vault-dynamic-secret
  namespace: vault-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Reference to VaultAuth
  vaultAuthRef: vault-auth
  
  # Database secret engine mount and role
  mount: database
  path: creds/demo-role
  
  # Renewal configuration
  renewalPercent: 67
  revocationAfter: 60s
  
  # Destination Kubernetes secret
  destination:
    name: vault-dynamic-secret
    create: true
    
  # Automatic rollout restart when credentials rotate
  rolloutRestartTargets:
    - kind: Deployment
      name: vault-demo-app

