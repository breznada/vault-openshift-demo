<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Secrets Operator Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.3rem;
            opacity: 0.95;
            font-weight: 300;
        }


        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 3px solid transparent;
        }

        .card.changed {
            animation: redBorderFlash 3s ease-out;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 70px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-title-section {
            display: flex;
            align-items: center;
        }

        .card-icon {
            font-size: 2.5rem;
            margin-right: 16px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 4px;
        }

        .card-method {
            font-size: 0.85rem;
            color: #718096;
            font-weight: 500;
        }

        .card-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-success {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }

        .badge-error {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
        }

        .badge-rotating {
            background: linear-gradient(135deg, #ed8936, #dd6b20);
            color: white;
            animation: badgePulse 1s infinite;
        }

        .card-content {
            min-height: 140px;
        }

        .data-grid {
            display: grid;
            gap: 12px;
        }

        .data-item {
            padding: 12px;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border-radius: 8px;
            border-left: 3px solid #4299e1;
            transition: all 0.3s ease;
        }

        .data-item:hover {
            background: linear-gradient(135deg, #edf2f7 0%, #e2e8f0 100%);
            transform: translateX(4px);
        }

        .data-item.changed {
            animation: itemHighlight 0.8s ease-out;
        }

        .data-label {
            font-weight: 700;
            color: #4a5568;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .data-value {
            color: #1a202c;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.95rem;
            word-break: break-all;
            line-height: 1.5;
        }

        .countdown {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4299e1;
            text-align: center;
            padding: 16px;
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border-radius: 12px;
            margin-top: 12px;
        }

        .countdown.warning {
            color: #ed8936;
            animation: badgePulse 1s infinite;
        }

        .countdown.critical {
            color: #f56565;
            animation: badgePulse 0.5s infinite;
        }

        .error-message {
            color: #e53e3e;
            padding: 16px;
            background: #fff5f5;
            border-radius: 8px;
            border-left: 4px solid #f56565;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 1.4rem;
            animation: fadeIn 0.6s ease-out;
        }

        .spinner {
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.8;
            animation: fadeIn 1s ease-out;
        }

        .refresh-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #48bb78;
            border-radius: 50%;
            margin-right: 8px;
            animation: indicatorPulse 2s infinite;
        }

        .change-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            animation: slideIn 0.4s ease-out;
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }


        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes redBorderFlash {
            0% {
                border-color: transparent;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            }
            10%, 90% {
                border-color: #f56565;
                box-shadow: 0 20px 60px rgba(245, 101, 101, 0.6);
            }
            100% {
                border-color: transparent;
                box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            }
        }

        @keyframes badgePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes indicatorPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes itemHighlight {
            0% { 
                background: linear-gradient(135deg, #fef5e7 0%, #fdeaa8 100%);
                transform: scale(1.02);
            }
            100% { 
                background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
                transform: scale(1);
            }
        }


        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .subtitle { font-size: 1rem; }
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 HashiCorp Vault Secrets Operator</h1>
            <p class="subtitle">Four Secret Delivery Methods • Live Rotation Demo</p>
        </header>


        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading secrets from Vault...</p>
        </div>

        <div id="dashboard" class="dashboard" style="display: none;">
            <!-- Cards will be inserted here -->
        </div>

        <div class="footer">
            <span class="refresh-indicator"></span>
            Checking for changes every second • Last updated: <span id="last-update">Never</span>
        </div>
    </div>

    <script>
        let previousData = {};
        let changedCards = new Set();

        const cardConfig = {
            static: { icon: '🔑', title: 'Static Secret', color: '#4299e1' },
            dynamic: { icon: '🔄', title: 'Dynamic Secret', color: '#48bb78' },
            csi: { icon: '💾', title: 'CSI Secret', color: '#ed8936' },
            pki: { icon: '📜', title: 'PKI Certificate', color: '#9f7aea' }
        };


        function detectChanges(cardId, newData) {
            const oldData = previousData[cardId];
            if (!oldData) {
                previousData[cardId] = JSON.stringify(newData);
                return { changed: false, changedFields: [] };
            }
            
            const oldObj = JSON.parse(oldData);
            const changedFields = [];
            
            // Compare each field
            if (newData.data && oldObj.data) {
                for (const key in newData.data) {
                    // Skip rotation_in field for change detection (it updates every second)
                    if (key === 'rotation_in') {
                        continue;
                    }
                    
                    if (newData.data[key] !== oldObj.data[key]) {
                        changedFields.push(key);
                    }
                }
            }
            
            // Never show red border for PKI card
            const changed = cardId !== 'pki' && changedFields.length > 0;
            
            if (changed) {
                previousData[cardId] = JSON.stringify(newData);
                changedCards.add(cardId);
            }
            
            return { changed, changedFields };
        }

        function renderCard(cardId, data, changeInfo) {
            const config = cardConfig[cardId];
            const { changed, changedFields } = changeInfo;
            
            let statusBadge = '';
            if (data.status === 'error') {
                statusBadge = '<span class="card-badge badge-error">ERROR</span>';
            } else {
                statusBadge = '<span class="card-badge badge-success">ACTIVE</span>';
            }

            let content = `
                <div class="card ${changed ? 'changed' : ''}">
                    ${changed ? '<div class="change-indicator">UPDATED</div>' : ''}
                    <div class="card-header">
                        <div class="card-title-section">
                            <div class="card-icon">${config.icon}</div>
                            <div>
                                <div class="card-title">${config.title}</div>
                                <div class="card-method">${data.method || 'Unknown Method'}</div>
                            </div>
                        </div>
                        ${statusBadge}
                    </div>
                    <div class="card-content">
            `;

            if (data.status === 'error') {
                content += `<div class="error-message">❌ ${data.error}</div>`;
            } else {
                content += '<div class="data-grid">';
                
                for (const [key, value] of Object.entries(data.data)) {
                    const displayKey = key.replace(/_/g, ' ').toUpperCase();
                    const displayValue = value; // Show full value for demo
                    
                    // Check if this specific field changed
                    const fieldChanged = changedFields.includes(key);
                    
                    content += `
                        <div class="data-item ${fieldChanged ? 'changed' : ''}">
                            <div class="data-label">${displayKey}</div>
                            <div class="data-value">${displayValue}</div>
                        </div>
                    `;
                }
                
                content += '</div>';
            }

            content += '</div></div>';
            return content;
        }

        async function fetchSecrets() {
            try {
                const response = await fetch('/api/secrets');
                const data = await response.json();
                
                // Detect changes for each card
                const staticChange = detectChanges('static', data.static);
                const dynamicChange = detectChanges('dynamic', data.dynamic);
                const csiChange = detectChanges('csi', data.csi);
                const pkiChange = detectChanges('pki', data.pki);
                
                // Always update UI (refresh every second)
                document.getElementById('loading').style.display = 'none';
                const dashboard = document.getElementById('dashboard');
                dashboard.style.display = 'grid';
                
                dashboard.innerHTML =
                    renderCard('static', data.static, staticChange) +
                    renderCard('dynamic', data.dynamic, dynamicChange) +
                    renderCard('csi', data.csi, csiChange) +
                    renderCard('pki', data.pki, pkiChange);
                
                document.getElementById('last-update').textContent =
                    new Date(data.timestamp).toLocaleTimeString();
                
            } catch (error) {
                console.error('Error fetching secrets:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="error-message">
                        Failed to load secrets: ${error.message}
                    </div>
                `;
            }
        }

        // Initial load
        fetchSecrets();

        // Auto-refresh every 1 second
        setInterval(fetchSecrets, 1000);
    </script>
</body>
</html>
